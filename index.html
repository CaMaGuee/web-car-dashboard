<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Car Dashboard</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./leaflet_1.9.4.css" />
</head>

<body>
  <div class="border-frame" id="border-frame"></div>

  <main class="app">
    <div class="overlay" id="overlay">
      <div class="overlay-content">
        <h1>위치 권한이 필요합니다.</h1>
        <p>이 앱은 GPS를 사용하여 속도를 측정합니다.</p>
        <p>위치 권한을 허용해주세요. </p>
        <button id="startBtn">위치 권한 요청</button>
      </div>
    </div>

    <div class="dashboard map" id="dashboard">
      <div class="speed-box">
        <div class="speed-content">
          <div id="speed">대기중</div>
          <div id="unit">km/h</div>
          <div id="status">위치 권한이 필요합니다.</div>
        </div>

        <div class="needle" id="needle"></div>

        <div class="label-speed label-0">0</div>
        <div class="label-speed label-30">30</div>
        <div class="label-speed label-50">50</div>
        <div class="label-speed label-100">100</div>
        <div class="label-speed label-150">150</div>
        <div class="label-speed label-200">200</div>
      </div>
    </div>
  </main>

  <script src="./app.js"></script>
  <script src="./leaflet_1.9.4.js"></script>
</body>

</html>
